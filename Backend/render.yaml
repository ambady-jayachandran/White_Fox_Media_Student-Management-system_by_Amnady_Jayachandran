services:
  - type: web
    name: school-management-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn school_management.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: school-management-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DB_ENGINE
        value: postgresql
      - key: DB_NAME
        fromDatabase:
          name: school-management-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: school-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: school-management-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: school-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: school-management-db
          property: port

databases:
  - name: school-management-db
    plan: free
